name: Deploy to VPS

on:
  push:
    branches:
      - main # Triggers the workflow every time code is pushed to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Permissions required to read repository code and write images to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Pull down the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Convert GitHub Actor (username) to lowercase to fix Docker registry naming rules
      - name: Convert GitHub username to lowercase
        run: |
          echo "IMAGE_OWNER=$(echo ${{ github.actor }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 3. Authenticate against GitHub's Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Set up Docker Buildx (enables modern, fast caching strategies)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build and Push the Go Backend Production Image
      - name: Build and Push Go Backend
        uses: docker/build-push-action@v5
        with:
          context: ./the-hub-backend/
          file: ./the-hub-backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Build and Push the Nuxt Frontend Production Image
      - name: Build and Push Nuxt Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./the-hub-frontend/
          file: ./the-hub-frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # 7. SSH into your VPS and pull the fresh images using Docker Compose
      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to where your production files live on the server
            cd /var/www/the-hub
            
            # Authenticate the VPS server to fetch images out of your private package registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull down the freshly built production containers from GHCR
            docker compose -f docker-compose.prod.yml pull
            
            # Restart the infrastructure cleanly in background detached mode (-d)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Prune old, dangling untagged images to keep your server storage clean
            docker image prune -f
